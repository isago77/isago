name: CD Setup
on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 원격으로 초기 세팅
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USERNAME }}
          key: ${{ secrets.REMOTE_PRIMARY_KEY }}
          script: |
            GITHUB_PAT="${{ secrets.GIT_PAT }}"

            echo "⚪ Git 설치"
            sudo yum install git -y
            echo "https://$GITHUB_PAT:@github.com" | git credential-store --file ~/.git-credentials store
            git clone https://github.com/isago77/isago

            echo "⚪ Node.js 22 버전 설치"
            curl -fsSL https://rpm.nodesource.com/setup_22.x | sudo bash -
            sudo yum install -y nodejs

            echo "⚪ Docker 설치"
            sudo yum install -y docker
            sudo systemctl start docker
            sudo systemctl enable docker

            echo "⚪ Docker Compose 플러그인 설치"
            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-aarch64 \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            echo "⚪ Liquibase를 통한 MariaDB 마이그레이션 수행"
            cd ./isago
            sudo npm run docker:service

            echo "🟡 MariaDB와 Redis가 완전히 초기화될 때까지 대기 중..."
            while \
              [ "$(sudo docker inspect -f '{{.State.Health.Status}}' MariaDB)" != "healthy" ] || \
              [ "$(sudo docker inspect -f '{{.State.Health.Status}}' Redis)" != "healthy" ]; do
              sleep 1
            done

            sudo npm run docker:migrate

            echo "🟢 자동화 배포 준비가 완료되었습니다."